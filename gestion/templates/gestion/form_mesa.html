{% extends 'gestion/base.html' %} {% block content %}
<div class="auth-wrapper" style="min-height: auto; padding: 20px 0;">
    <div class="auth-container" style="max-width: 500px;">
        <h2>{{ titulo }}</h2>
        <form method="post" style="text-align: left;">
            {% csrf_token %} {% for field in form %}
            <div style="margin-bottom: 15px;">
                <label style="font-weight: bold; display: block; margin-bottom: 5px;">{{ field.label }}:</label> {{ field }}
            </div>
            {% endfor %}
            <div style="margin-top: 30px; display: flex; gap: 10px;">
                <button type="submit" class="btn-auth" style="margin: 0;">GUARDAR</button>
                <a href="{% url 'lista_mesas' %}" class="btn-auth" style="background: #ccc; text-decoration: none; text-align: center; margin: 0;">CANCELAR</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
