{% extends 'gestion/base.html' %} {% block content %}
<div class="auth-wrapper" style="min-height: auto; padding: 40px 0;">
    <div class="auth-container" style="max-width: 600px; border-left: 6px solid #800000;">
        <h2>{{ titulo }}</h2>
        <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 20px;">

        <form method="post" style="text-align: left;">
            {% csrf_token %} {% for field in form %}
            <div style="margin-bottom: 15px;">
                <label style="font-weight: bold; display: block; margin-bottom: 5px;">{{ field.label }}:</label> {{ field }} {% if field.errors %}
                <small style="color: red;">{{ field.errors.0 }}</small> {% endif %}
            </div>
            {% endfor %}

            <div style="margin-top: 30px; display: flex; gap: 10px;">
                <button type="submit" class="btn-auth" style="margin: 0; flex: 2;">GENERAR FACTURA</button>
                <a href="{% url 'lista_facturas' %}" class="btn-auth" style="background: #ccc; text-decoration: none; text-align: center; margin: 0; flex: 1; display: flex; align-items: center; justify-content: center;">CANCELAR</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
