{% extends 'gestion/base.html' %} {% block content %}
<div class="auth-wrapper" style="min-height: auto; padding: 20px 0;">
    <div class="auth-container" style="max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h2 style="margin-top: 0; color: var(--primario);">{{ titulo }}</h2>
        <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 20px;">

        <form method="post" style="text-align: left;">
            {% csrf_token %} {% for field in form %}
            <div style="margin-bottom: 15px;">
                <label style="font-weight: bold; display: block; margin-bottom: 5px; color: #555;">
                        {{ field.label }}
                    </label>
                <div style="width: 100%;">
                    {{ field }}
                </div>
                {% if field.errors %}
                <small style="color: #c0392b;">{{ field.errors }}</small> {% endif %}
            </div>
            {% endfor %}

            <div style="margin-top: 30px; display: flex; gap: 10px;">
                <button type="submit" class="btn-auth" style="margin: 0; flex: 1;">
                    GUARDAR PLATO
                </button>
                <a href="{% url 'lista_platos' %}" class="btn-auth" style="background: #95a5a6; text-decoration: none; text-align: center; margin: 0; flex: 1; display: flex; align-items: center; justify-content: center;">
                    CANCELAR
                </a>
            </div>
        </form>
    </div>
</div>

<style>
    input,
    select,
    textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        box-sizing: border-box;
    }
    
    input[type="checkbox"] {
        width: auto;
    }
</style>
{% endblock %}
